<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Visualizer Studio Pro v8</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { margin: 0; background: #030308; color: #fff; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: #0a0a14; padding: 15px; border-radius: 12px; border: 1px solid #15152a; }
        h2 { font-size: 14px; color: #00f0ff; margin-top: 0; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { margin-bottom: 8px; display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 9px; text-transform: uppercase; color: #6c6c83; font-weight: bold; }
        input[type="text"], input[type="file"], select, input[type="range"] { background: #101020; border: 1px solid #202040; color: #fff; padding: 7px; border-radius: 5px; font-size: 11px; width: 100%; }
        .canvas-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 10px; border: 1px solid #202040; }
        #canvas { width: 100%; height: 100%; display: block; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 5px; }
        .btn { color: #fff; border: none; padding: 10px; border-radius: 5px; font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase; flex: 1; }
        #preview-btn { background: #00f0ff; color: #000; }
        #action-btn { background: #ff0055; }
        .btn:disabled { background: #151525 !important; color: #3a3a55 !important; cursor: not-allowed; }
        .status-box { background: #05050a; padding: 6px; border-radius: 5px; font-size: 10px; color: #8080a0; text-align: center; border: 1px solid #101020; margin-bottom: 10px; }
        .progress-bar-container { width: 100%; background: #101020; height: 4px; border-radius: 2px; overflow: hidden; display: none; margin-bottom: 8px; }
        .progress-bar { width: 0%; height: 100%; background: #00f0ff; }
        audio { display: none; }
        .row { display: flex; gap: 6px; }
        .row > div { flex: 1; }
        .section-title { font-size: 10px; color: #ff0055; font-weight: bold; margin: 8px 0 4px 0; text-transform: uppercase; border-bottom: 1px solid #202040; padding-bottom: 1px; }
        .footer { font-size: 9px; color: #444466; text-align: center; margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Mobile Studio Pro v8</h2>
        
        <div class="canvas-container">
            <canvas id="canvas" width="1280" height="720"></canvas>
        </div>

        <div class="control-group">
            <label>1. Pilih Musik</label>
            <input type="file" id="audio-input" accept="audio/*">
        </div>

        <div class="btn-row">
            <button id="preview-btn" class="btn" disabled>Play Preview</button>
            <button id="action-btn" class="btn" disabled>Mulai Rekam Video</button>
        </div>
        <div class="progress-bar-container" id="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div id="status-text" class="status-box">Silakan masukkan file musik untuk mengaktifkan studio.</div>

        <div class="section-title">Preset Profile Instan (Siap Pakai)</div>
        <div class="control-group">
            <select id="profile-preset">
                <option value="none">-- Pilih Custom Profile --</option>
                <option value="cyberpunk">Cyberpunk Neon Night (Garis Vektor + Rainbow + Tunnel)</option>
                <option value="retro">Retro Vaporwave (Garis Vektor + Sunset Purple + Meteor)</option>
                <option value="space">Deep Space Nebula (Garis Vektor + Crystal White + Chaos)</option>
                <option value="deepsea">Deep Sea Abyss (Garis Vektor + Ocean Green + Bubbles)</option>
                <option value="minimal">Minimalist Calm (Garis Vektor + Soft Gray + Snow)</option>
            </select>
        </div>

        <div class="section-title">Konfigurasi Teks</div>
        <div class="row">
            <div class="control-group"><label>Artis</label><input type="text" id="artist-text" value="SRISP"></div>
            <div class="control-group"><label>Judul</label><input type="text" id="title-text" value="Gravity of Light"></div>
        </div>
        <div class="row">
            <div class="control-group">
                <label>Gaya Font</label>
                <select id="font-select">
                    <option value="bold 60px 'Montserrat'">Montserrat</option>
                    <option value="italic 60px 'Playfair Display'">Playfair</option>
                    <option value="65px 'Bebas Neue'">Bebas Neue</option>
                </select>
            </div>
            <div class="control-group"><label>Posisi X</label><input type="range" id="text-x-slider" min="100" max="1180" value="640"></div>
            <div class="control-group"><label>Posisi Y</label><input type="range" id="text-y-slider" min="100" max="680" value="540"></div>
        </div>

        <div class="section-title">Konfigurasi Grafik Spektrum</div>
        <div class="row">
            <div class="control-group">
                <label>Bentuk Spektrum</label>
                <select id="template-select">
                    <option value="bar">Classic Music Bars</option>
                    <option value="double-bar">Mirror Twin Bars</option>
                    <option value="updown">Up-Down Equalizer</option>
                    <option value="wave">Waveform Glowing Line</option>
                    <option value="spike">Spike Pulse Matrix</option>
                    <option value="circle">Circular Aura Rhythm</option>
                    <option value="circle-wave">Circular Wave Ring</option>
                    <option value="split">Side-by-Side Split</option>
                    <option value="block">Solid Block Staircase</option>
                    <option value="radial-fire">Radial Outer Fire</option>
                    <option value="dna">DNA Helix Linear</option>
                    <option value="heartbeat">Heartbeat Pulse</option>
                </select>
            </div>
            <div class="control-group">
                <label>Skema Warna</label>
                <select id="color-select">
                    <option value="rainbow">🌈 Dynamic Rainbow (Pelangi)</option>
                    <option value="rgba(0,240,255,0.65)">🩵 Neon Cyan</option>
                    <option value="rgba(255,0,85,0.65)">🩷 Ruby Red</option>
                    <option value="rgba(0,255,102,0.65)">💚 Lime Emerald</option>
                    <option value="rgba(255,255,255,0.55)">🤍 Crystal White</option>
                    <option value="rgba(255,170,0,0.65)">🧡 Sunset Gold</option>
                    <option value="rgba(190,0,255,0.65)">💜 Electric Purple</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="control-group"><label>Posisi Vertikal</label><input type="range" id="spec-y-slider" min="50" max="670" value="340"></div>
            <div class="control-group"><label>Lebar Bentangan</label><input type="range" id="spec-w-slider" min="400" max="1280" value="1280"></div>
            <div class="control-group"><label>Sensitivitas Tinggi</label><input type="range" id="spec-h-slider" min="50" max="500" value="260"></div>
        </div>

        <div class="section-title">Latar Belakang & Efek Partikel</div>
        <div class="row">
            <div class="control-group">
                <label>Jenis Efek</label>
                <select id="particle-type">
                    <option value="meteor">Meteor / Bintang Jatuh</option>
                    <option value="bubbles">Bubbles / Gelembung Naik</option>
                    <option value="snow">Snowflake / Salju Lembut</option>
                    <option value="tunnel">Tunnel / Lorong Waktu 3D</option>
                    <option value="chaos">Chaos Pulse / Denyut Acak</option>
                    <option value="none">Matikan Efek Partikel</option>
                </select>
            </div>
            <div class="control-group">
                <label>Background</label>
                <select id="bg-select">
                    <option value="vector">Bentuk Garis Vektor Minimalis</option>
                    <option value="custom">-- Pake Foto Kustom --</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="control-group"><label>Jumlah</label><input type="range" id="particle-count" min="10" max="150" value="60"></div>
            <div class="control-group"><label>Ukuran Max</label><input type="range" id="particle-size" min="2" max="15" value="5"></div>
            <div class="control-group"><label>Kecepatan Dasar</label><input type="range" id="particle-speed" min="0.1" max="10" step="0.1" value="2"></div>
        </div>
        <input type="file" id="bg-custom-input" accept="image/*" style="display: none; margin-top: 5px;">
        
        <div class="footer">Copyright &copy; SRISP 2026</div>
        <audio id="audio-player"></audio>
    </div>

    <script>
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        const audioInput = document.getElementById('audio-input'); const artistText = document.getElementById('artist-text');
        const titleText = document.getElementById('title-text'); const fontSelect = document.getElementById('font-select');
        const textXSlider = document.getElementById('text-x-slider'); const textYSlider = document.getElementById('text-y-slider');
        const templateSelect = document.getElementById('template-select'); const colorSelect = document.getElementById('color-select');
        const specYSlider = document.getElementById('spec-y-slider'); const specWSlider = document.getElementById('spec-w-slider');
        const specHSlider = document.getElementById('spec-h-slider'); const bgSelect = document.getElementById('bg-select');
        const bgCustomInput = document.getElementById('bg-custom-input'); const actionBtn = document.getElementById('action-btn');
        const previewBtn = document.getElementById('preview-btn'); const statusText = document.getElementById('status-text');
        const progressContainer = document.getElementById('progress-container'); const progressBar = document.getElementById('progress-bar');
        const audioPlayer = document.getElementById('audio-player'); const profilePreset = document.getElementById('profile-preset');
        const particleType = document.getElementById('particle-type'); const particleCount = document.getElementById('particle-count');
        const particleSize = document.getElementById('particle-size'); const particleSpeed = document.getElementById('particle-speed');

        let audioCtx = null, analyser = null, source = null, mediaRecorder = null, recordedChunks = [], animationFrameId = null, isRecording = false, isPreviewing = false, uploadedBgImg = null, wakeLock = null;
        let hueOffset = 0;
        
        const particles = [];
        function initParticles() {
            particles.length = 0;
            const count = parseInt(particleCount.value);
            const maxSize = parseInt(particleSize.value);
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    z: Math.random() * canvas.width,
                    speedFactor: Math.random() * 0.6 + 0.4,
                    size: Math.random() * (maxSize - 1) + 1,
                    alpha: Math.random() * 0.4 + 0.2,
                    angle: Math.random() * Math.PI * 2
                });
            }
        }
        initParticles();
        [particleCount, particleSize, particleSpeed].forEach(el => el.addEventListener('input', initParticles));
        particleType.addEventListener('change', initParticles);

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
            } catch (err) { console.log(`${err.name}, ${err.message}`); }
        }
        function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } }

        profilePreset.addEventListener('change', function() {
            const p = this.value;
            if (p === 'none') return;
            bgSelect.value = 'vector'; uploadedBgImg = null; bgCustomInput.style.display = 'none';
            if (p === 'cyberpunk') {
                colorSelect.value = 'rainbow'; templateSelect.value = 'tunnel'; particleType.value = 'tunnel';
                particleSpeed.value = '4'; specHSlider.value = '350';
            } else if (p === 'retro') {
                colorSelect.value = 'rgba(190,0,255,0.65)'; templateSelect.value = 'double-bar'; particleType.value = 'meteor';
                particleSpeed.value = '1.5'; specHSlider.value = '240';
            } else if (p === 'space') {
                colorSelect.value = 'rgba(255,255,255,0.55)'; templateSelect.value = 'circle-wave'; particleType.value = 'chaos';
                particleSpeed.value = '0.5'; specHSlider.value = '300';
            } else if (p === 'deepsea') {
                colorSelect.value = 'rgba(0,255,102,0.65)'; templateSelect.value = 'wave'; particleType.value = 'bubbles';
                particleSpeed.value = '1.2'; specHSlider.value = '200';
            } else if (p === 'minimal') {
                colorSelect.value = 'rgba(255,255,255,0.55)'; templateSelect.value = 'updown'; particleType.value = 'snow';
                particleSpeed.value = '0.3'; specHSlider.value = '150';
            }
            initParticles(); drawPreview();
        });

        bgSelect.addEventListener('change', function() {
            bgCustomInput.style.display = (this.value === 'custom') ? 'block' : 'none';
            if(this.value !== 'custom') { uploadedBgImg = null; drawPreview(); }
        });

        bgCustomInput.addEventListener('change', function() {
            if (this.files.length === 0) return;
            const reader = new FileReader();
            reader.onload = e => { uploadedBgImg = new Image(); uploadedBgImg.src = e.target.result; uploadedBgImg.onload = drawPreview; };
            reader.readAsDataURL(this.files[0]);
        });

        function drawVectorShapes() {
            const mode = profilePreset.value;
            ctx.fillStyle = "#030308"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            
            let stroke1 = "rgba(0, 240, 255, 0.15)", stroke2 = "rgba(255, 0, 85, 0.15)";
            if (mode === 'retro') { stroke1 = "rgba(255, 170, 0, 0.12)"; stroke2 = "rgba(190, 0, 255, 0.12)"; }
            if (mode === 'minimal') { stroke1 = "rgba(255, 255, 255, 0.05)"; stroke2 = "rgba(255, 255, 255, 0.05)"; }

            ctx.strokeStyle = stroke1;
            ctx.beginPath(); ctx.arc(250, 360, 200, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(250, 360, 100, 0, Math.PI*2); ctx.stroke();
            
            ctx.strokeStyle = stroke2;
            ctx.beginPath(); ctx.arc(1030, 360, 200, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(1030, 360, 100, 0, Math.PI*2); ctx.stroke();
            
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for(let i = 0; i <= canvas.width; i += 80) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
        }

        function drawBackground() {
            if (bgSelect.value === 'custom' && uploadedBgImg) {
                ctx.drawImage(uploadedBgImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(3, 3, 8, 0.55)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                drawVectorShapes();
            }
        }

        function updateAndDrawParticles(audioIntensity) {
            const type = particleType.value;
            if (type === 'none') return;
            const sliderSpeed = parseFloat(particleSpeed.value);
            const maxSize = parseInt(particleSize.value);

            particles.forEach(p => {
                let currentSpeed = (sliderSpeed * p.speedFactor) + (audioIntensity * 15);
                let currentSize = p.size + (audioIntensity * (maxSize * 1.2));
                let drawX = p.x, drawY = p.y;
                let finalAlpha = Math.min(1, p.alpha + audioIntensity);

                if (type === 'meteor') {
                    p.y += currentSpeed;
                    if(p.y > canvas.height) { p.y = 0; p.x = Math.random() * canvas.width; }
                } else if (type === 'bubbles') {
                    p.y -= currentSpeed * 0.8;
                    if(p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
                } else if (type === 'snow') {
                    p.y += currentSpeed * 0.5; p.angle += 0.015;
                    drawX += Math.sin(p.angle) * 1.5;
                    if(p.y > canvas.height) { p.y = 0; p.x = Math.random() * canvas.width; }
                } else if (type === 'tunnel') {
                    p.z -= currentSpeed * 2;
                    if (p.z <= 0) { p.z = canvas.width; p.x = Math.random() * canvas.width - canvas.width/2; p.y = Math.random() * canvas.height - canvas.height/2; }
                    drawX = (p.x / p.z) * canvas.width + canvas.width/2;
                    drawY = (p.y / p.z) * canvas.height + canvas.height/2;
                    currentSize = (maxSize * (canvas.width / p.z)) * 0.15;
                    if(drawX < 0 || drawX > canvas.width || drawY < 0 || drawY > canvas.height) p.z = canvas.width;
                } else if (type === 'chaos') {
                    finalAlpha = Math.min(1, (p.alpha * 0.2) + (audioIntensity * 1.3));
                    currentSize = p.size + (audioIntensity * maxSize * 2.5);
                }

                ctx.beginPath(); ctx.arc(drawX, drawY, Math.max(0.3, currentSize), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${finalAlpha})`; ctx.fill();
            });
        }

        function drawPreview() {
            if (isPreviewing || isRecording) return;
            drawBackground(); updateAndDrawParticles(0.01);
            
            const textX = parseInt(textXSlider.value); const textY = parseInt(textYSlider.value);
            ctx.textAlign = "center"; ctx.fillStyle = "#ffffff";
            ctx.font = fontSelect.value; ctx.fillText(artistText.value, textX, textY);
            ctx.font = "32px sans-serif"; ctx.fillStyle = "rgba(255, 255, 255, 0.65)";
            ctx.fillText(titleText.value, textX, textY + 45);
        }

        [artistText, titleText, fontSelect, textXSlider, textYSlider, templateSelect, colorSelect, specYSlider, specWSlider, specHSlider, bgSelect, particleType, particleSpeed].forEach(el => {
            el.addEventListener('input', drawPreview); el.addEventListener('change', drawPreview);
        });

        audioInput.addEventListener('change', function() {
            if (this.files.length === 0) return;
            audioPlayer.src = URL.createObjectURL(this.files[0]);
            statusText.innerText = "Musik siap! Tekan 'Play Preview' untuk tes atau langsung rekam.";
            actionBtn.disabled = false; previewBtn.disabled = false; drawPreview();
        });

        function setupAudioNodes() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser); analyser.connect(audioCtx.destination);
            }
        }

        function renderLoop() {
            if (!isPreviewing && !isRecording) return;
            animationFrameId = requestAnimationFrame(renderLoop);
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            if (['wave','circle-wave'].includes(templateSelect.value)) analyser.getByteTimeDomainData(dataArray);
            else analyser.getByteFrequencyData(dataArray);

            let sum = 0; for(let i=0; i<40; i++) sum += dataArray[i];
            let audioIntensity = (sum / 40) / 255;

            drawBackground(); updateAndDrawParticles(audioIntensity);

            const specY = parseInt(specYSlider.value), specW = parseInt(specWSlider.value), specH = parseInt(specHSlider.value);
            
            if (colorSelect.value === 'rainbow') {
                hueOffset = (hueOffset + 1) % 360;
                ctx.fillStyle = `hsla(${hueOffset}, 100%, 60%, 0.75)`;
                ctx.strokeStyle = `hsla(${hueOffset}, 100%, 60%, 0.75)`;
                ctx.shadowColor = `hsla(${hueOffset}, 100%, 60%, 0.75)`;
            } else {
                ctx.fillStyle = colorSelect.value; ctx.strokeStyle = colorSelect.value; ctx.shadowColor = colorSelect.value;
            }
            ctx.lineWidth = 4; ctx.shadowBlur = 10;

            const style = templateSelect.value, startX = (canvas.width - specW) / 2, points = 50;
            const step = specW / points;

            if (style === 'bar') {
                for (let i = 0; i < points; i++) {
                    let h = (dataArray[i % bufferLength] / 255) * specH;
                    ctx.fillRect(startX + (i * step), specY - h, step - 2, h + 2);
                }
            } else if (style === 'double-bar') {
                for (let i = 0; i < points; i++) {
                    let h = (dataArray[i % bufferLength] / 255) * (specH / 2);
                    ctx.fillRect(startX + (i * step), specY - h, step - 2, h);
                    ctx.fillRect(startX + (i * step), specY, step - 2, h);
                }
            } else if (style === 'updown') {
                for (let i = 0; i < points; i++) {
                    let h = (dataArray[i % bufferLength] / 255) * specH;
                    ctx.fillRect(startX + (i * step), specY - (h/2), step - 2, h);
                }
            } else if (style === 'wave') {
                ctx.beginPath(); let x = startX;
                for (let i = 0; i < bufferLength; i++) {
                    let v = dataArray[i] / 128.0; let y = specY + (v - 1.0) * specH;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += (specW / bufferLength);
                }
                ctx.stroke();
            } else if (style === 'spike') {
                for(let i=0; i<points; i++) {
                    let h = (dataArray[i % bufferLength] / 255) * specH;
                    ctx.beginPath(); ctx.moveTo(startX + (i * step), specY); ctx.lineTo(startX + (i * step), specY - h); ctx.stroke();
                }
            } else if (style === 'circle' || style === 'circle-wave') {
                ctx.beginPath(); const centerX = startX + (specW / 2), baseR = specH / 3.5;
                for (let i = 0; i < 60; i++) {
                    let angle = (i / 60) * Math.PI * 2;
                    let val = style === 'circle' ? (dataArray[i % 30]/255) : ((dataArray[i % bufferLength]/128.0)-1.0);
                    let r = baseR + val * specH * 0.4;
                    let x = centerX + Math.cos(angle) * r, y = specY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            } else if (style === 'split') {
                const halfW = specW / 2, bW = halfW / 25, cX = startX + halfW;
                for(let i=0; i<25; i++) {
                    let h = (dataArray[i % bufferLength] / 255) * specH;
                    ctx.fillRect(cX + (i * bW), specY - h, bW - 2, h + 2);
                    ctx.fillRect(cX - (i * bW) - bW, specY - h, bW - 2, h + 2);
                }
            } else if (style === 'block') {
                for (let i = 0; i < 30; i++) {
                    let blocks = Math.floor((dataArray[i % bufferLength] / 255) * 8);
                    for(let b=0; b<blocks; b++) ctx.fillRect(startX + (i * (specW/30)), specY - (b * (specH / 10)), (specW/30) - 3, (specH / 14));
                }
            } else if (style === 'radial-fire') {
                const cX = startX + (specW / 2), baseR = specH / 4;
                for (let i = 0; i < 60; i++) {
                    let angle = (i / 60) * Math.PI * 2;
                    let h = (dataArray[i % 30] / 255) * specH * 0.6;
                    ctx.beginPath(); ctx.moveTo(cX + Math.cos(angle)*baseR, specY + Math.sin(angle)*baseR);
                    ctx.lineTo(cX + Math.cos(angle)*(baseR+h), specY + Math.sin(angle)*(baseR+h)); ctx.stroke();
                }
            } else if (style === 'dna') {
                for (let i = 0; i < points; i++) {
                    let h = (dataArray[i % bufferLength] / 255) * (specH * 0.4);
                    let xPos = startX + (i * step);
                    ctx.beginPath(); ctx.arc(xPos, specY - h, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(xPos, specY + h, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(xPos, specY - h); ctx.lineTo(xPos, specY + h); ctx.stroke();
                }
            } else if (style === 'heartbeat') {
                ctx.beginPath(); let hX = startX;
                for(let i=0; i<points; i++) {
                    let pulse = (i === 20 || i === 25) ? audioIntensity * specH : 0;
                    ctx.lineTo(hX, specY - pulse + (Math.sin(i)*5)); hX += step;
                }
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
            const textX = parseInt(textXSlider.value); const textY = parseInt(textYSlider.value);
            ctx.textAlign = "center"; ctx.fillStyle = "#ffffff";
            ctx.font = fontSelect.value; ctx.fillText(artistText.value, textX, textY);
            ctx.font = "32px sans-serif"; ctx.fillStyle = "rgba(255, 255, 255, 0.65)";
            ctx.fillText(titleText.value, textX, textY + 45);

            if (isRecording && audioPlayer.duration) {
                const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = pct + "%";
                statusText.innerText = `Merekam Video: ${Math.floor(pct)}% (${Math.floor(audioPlayer.currentTime)}s / ${Math.floor(audioPlayer.duration)}s)`;
            }
        }

        previewBtn.addEventListener('click', () => {
            if (isRecording) return; setupAudioNodes();
            if (!isPreviewing) {
                isPreviewing = true; audioPlayer.play(); renderLoop();
                previewBtn.innerText = "Pause Preview"; statusText.innerText = "Preview Aktif.";
            } else {
                isPreviewing = false; audioPlayer.pause(); cancelAnimationFrame(animationFrameId);
                previewBtn.innerText = "Play Preview"; statusText.innerText = "Preview Dihentikan.";
            }
        });

        actionBtn.addEventListener('click', async () => {
            if (isPreviewing) { isPreviewing = false; audioPlayer.pause(); cancelAnimationFrame(animationFrameId); previewBtn.innerText = "Play Preview"; }
            
            isRecording = true; actionBtn.disabled = true; previewBtn.disabled = true;
            progressContainer.style.display = "block"; recordedChunks = [];
            
            await requestWakeLock(); setupAudioNodes();

            const videoStream = canvas.captureStream(30);
            const audioStream = audioPlayer.captureStream ? audioPlayer.captureStream() : audioPlayer.webkitCaptureStream();
            const combinedStream = new MediaStream();
            videoStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
            audioStream.getAudioTracks().forEach(track => combinedStream.addTrack(track));

            let options = { mimeType: 'video/webm;codecs=vp8' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/mp4' };

            mediaRecorder = new MediaRecorder(combinedStream, options);
            mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                cancelAnimationFrame(animationFrameId); releaseWakeLock();
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `${artistText.value.trim()}_${titleText.value.trim()}.mp4`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                
                statusText.innerText = "Selesai! Video berhasil diunduh.";
                actionBtn.disabled = false; previewBtn.disabled = false; actionBtn.innerText = "Mulai Rekam Video";
                progressContainer.style.display = "none"; isRecording = false;
            };

            audioPlayer.currentTime = 0; audioPlayer.play(); mediaRecorder.start(); renderLoop();
            actionBtn.innerText = "Merekam... Layar Dipaksa Aktif";
        });

        audioPlayer.addEventListener('ended', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (isPreviewing) { isPreviewing = false; previewBtn.innerText = "Play Preview"; cancelAnimationFrame(animationFrameId); }
        });

        drawPreview();
    </script>
</body>
</html>
